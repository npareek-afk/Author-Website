<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Nitin Pareek</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="header.js" defer></script>
</head>
<body>

    <main class="container">
        <section class="gallery-section" style="padding: 40px 0;">
            <h1 class="page-title" style="text-align: center;">Gallery</h1>
            <p class="accent-text" style="text-align: center; margin-bottom: 30px;">Moments from the World Book Fair and the journey through AI Land.</p>
    
            <div class="gallery-grid">
                <div class="gallery-item"><img src="photos/1.jpg" alt="Photo 1"></div>
                <div class="gallery-item"><img src="photos/2.jpg" alt="Photo 2"></div>
                <div class="gallery-item"><img src="photos/3.jpg" alt="Photo 3"></div>
                <div class="gallery-item"><img src="photos/4.jpg" alt="Photo 4"></div>
                <div class="gallery-item"><img src="photos/5.jpg" alt="Photo 5"></div>
                <div class="gallery-item"><img src="photos/6.jpg" alt="Photo 6"></div>
                <div class="gallery-item"><img src="photos/7.jpg" alt="Photo 7"></div>
                <div class="gallery-item"><img src="photos/8.jpg" alt="Photo 8"></div>
                <div class="gallery-item"><img src="photos/9.jpg" alt="Photo 9"></div>
                <div class="gallery-item"><img src="photos/10.jpg" alt="Photo 10"></div>
                <div class="gallery-item"><img src="photos/11.jpg" alt="Photo 11"></div>
                <div class="gallery-item"><img src="photos/12.jpg" alt="Photo 12"></div>
            </div>
        </section>
    </main>

    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <footer>
        <p style="text-align: center; padding: 40px 0; font-size: 0.8rem; color: #888;">&copy; 2026 Nitin Pareek</p>
    </footer>

    <script>
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("fullImage");
        const span = document.querySelector(".close");

        document.querySelectorAll('.gallery-item img').forEach(image => {
            image.onclick = function() {
                modal.style.display = "flex";
                modalImg.src = this.src;
            }
        });

        span.onclick = () => modal.style.display = "none";
        modal.onclick = (e) => { if(e.target !== modalImg) modal.style.display = "none"; }
    </script>
</body>
</html>
