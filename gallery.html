<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Nitin Pareek</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="header.js" defer></script>
    <style>
        /* Lightbox Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 4px;
            animation: zoom 0.3s;
        }
        @keyframes zoom {
            from {transform:scale(0.8); opacity:0} 
            to {transform:scale(1); opacity:1}
        }
        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <main class="container">
        <section class="gallery-section" style="padding: 60px 0;">
            <h1 class="page-title">Gallery</h1>
            <p class="accent-text" style="text-align: center; margin-bottom: 40px; color: #666;">Moments from the World Book Fair and the journey through AI Land.</p>
    
            <div class="gallery-grid">
                <div class="gallery-item"><img src="photos/1.jpg" alt="Photo 1"></div>
                <div class="gallery-item"><img src="photos/2.jpg" alt="Photo 2"></div>
                <div class="gallery-item"><img src="photos/3.jpg" alt="Photo 3"></div>
                <div class="gallery-item"><img src="photos/4.jpg" alt="Photo 4"></div>
                <div class="gallery-item"><img src="photos/5.jpg" alt="Photo 5"></div>
                <div class="gallery-item"><img src="photos/6.jpg" alt="Photo 6"></div>
                <div class="gallery-item"><img src="photos/7.jpg" alt="Photo 7"></div>
                <div class="gallery-item"><img src="photos/8.jpg" alt="Photo 8"></div>
                <div class="gallery-item"><img src="photos/9.jpg" alt="Photo 9"></div>
                <div class="gallery-item"><img src="photos/10.jpg" alt="Photo 10"></div>
                <div class="gallery-item"><img src="photos/11.jpg" alt="Photo 11"></div>
                <div class="gallery-item"><img src="photos/12.jpg" alt="Photo 12"></div>
            </div>
        </section>
    </main>

    <div id="imageModal" class="modal" style="display:none;">
        <span class="close">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <footer>
        <p style="text-align: center; padding: 40px; color: #888; font-size: 0.8rem;">&copy; 2026 Nitin Pareek. Built with care.</p>
    </footer>

    <script>
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("fullImage");
        const span = document.getElementsByClassName("close")[0];

        document.querySelectorAll('.gallery-item img').forEach(image => {
            image.onclick = function() {
                modal.style.display = "flex";
                modalImg.src = this.src;
            }
        });

        span.onclick = function() { modal.style.display = "none"; }
        modal.onclick = function(event) {
            if (event.target !== modalImg) { modal.style.display = "none"; }
        }
    </script>
</body>
</html>
