<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Nitin Pareek</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="header.js" defer></script>
</head>
<body>
    <main class="container">
        <section style="padding: 60px 0;">
            <h1 class="page-title">Connect</h1>
            <p class="accent-text" style="text-align: center; margin-bottom: 40px;">Let’s start a conversation.</p>

            <div class="quick-connect-bar" style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; margin-bottom: 50px; padding: 20px 0; border-bottom: 1px solid #eee; border-top: 1px solid #eee;">
                <div class="connect-item" style="text-align: center;">
                    <strong style="display:block; font-size: 0.7rem; color: #888; text-transform: uppercase; font-family: 'Montserrat'; margin-bottom: 5px;">Email</strong>
                    <a href="mailto:author.nitinpareek@gmail.com" style="color: #b08d57; text-decoration: none; font-weight: 600;">author.nitinpareek@gmail.com</a>
                </div>
                <div class="connect-item" style="text-align: center;">
                    <strong style="display:block; font-size: 0.7rem; color: #888; text-transform: uppercase; font-family: 'Montserrat'; margin-bottom: 5px;">LinkedIn</strong>
                    <a href="https://www.linkedin.com/in/nitin-pareek-1752321/" target="_blank" style="color: #333; text-decoration: none; font-weight: 500;">In/NitinPareek</a>
                </div>
                <div class="connect-item" style="text-align: center;">
                    <strong style="display:block; font-size: 0.7rem; color: #888; text-transform: uppercase; font-family: 'Montserrat'; margin-bottom: 5px;">Instagram</strong>
                    <a href="https://www.instagram.com/neat__in" target="_blank" style="color: #333; text-decoration: none; font-weight: 500;">@neat__in</a>
                </div>
            </div>

            <div class="form-section-wrapper" style="max-width: 750px; margin: 0 auto;">
                <h2 class="section-heading" style="justify-content: center; margin-bottom: 25px;">
                    <span><img src="https://img.icons8.com/ios-filled/24/b08d57/phone-contact.png" style="vertical-align: middle; margin-right: 10px; width: 18px;"></span>
                    Send a Message
                </h2>
                
                <div class="form-container" style="border: 1px solid #eee; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: #fff;">
                    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfX4dRxT-X1qODySKMzoRj9K_BmD6zQ5PvyDM-oLnzv6oWiIg/viewform?embedded=true" 
                            width="100%" 
                            height="850" 
                            frameborder="0" 
                            marginheight="0" 
                            marginwidth="0">
                        Loading…
                    </iframe>
                </div>
                
                <p style="margin-top: 30px; text-align: center; font-family: 'Playfair Display'; font-style: italic; color: #555; font-size: 1.1rem;">
                    "I personally read and respond to every thoughtful message."
                </p>
            </div>
        </section>
    </main>

    <footer style="margin-top: 40px; border-top: 1px solid #eee;">
        <p style="text-align: center; padding: 40px; color: #888; font-size: 0.8rem;">&copy; 2026 Nitin Pareek. Built with care.</p>
    </footer>

</body>
</html>
